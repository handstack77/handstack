<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HandStack Deploy</title>
    <style>
        :root {
            --bg: #f4efe8;
            --panel: #fffdf9;
            --ink: #1f2933;
            --muted: #6b7280;
            --line: #d8cfc2;
            --accent: #9a3412;
            --accent-strong: #7c2d12;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "Malgun Gothic", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, #f7d9b7, transparent 28%),
                linear-gradient(180deg, #f6f1e8 0%, #efe7db 100%);
        }
        main { max-width: 1100px; margin: 0 auto; padding: 24px; }
        h1 { margin: 0 0 12px; font-size: 32px; }
        p { margin: 0 0 16px; color: var(--muted); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 14px 28px rgba(31, 41, 51, 0.08);
        }
        label { display: block; margin: 10px 0 6px; font-weight: 600; }
        input, textarea, select, button { width: 100%; font: inherit; }
        input, textarea, select {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            background: #fff;
        }
        button {
            margin-top: 12px;
            border: 0;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            padding: 11px 16px;
            cursor: pointer;
        }
        button:hover { background: var(--accent-strong); }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            background: var(--panel);
            border-radius: 16px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }
        .status {
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(154, 52, 18, 0.08);
            color: var(--accent-strong);
            margin-bottom: 16px;
            min-height: 42px;
        }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .actions button { width: auto; margin-top: 0; }
        .mono { font-family: Consolas, "Courier New", monospace; font-size: 12px; }
    </style>
</head>
<body>
    <main>
        <h1>HandStack Deploy</h1>
        <p>release 생성, ZIP 업로드, stable publish, 이력 조회를 한 화면에서 관리합니다.</p>
        <div id="status" class="status">대기 중</div>

        <div class="grid">
            <section class="card">
                <h2>관리 키</h2>
                <label for="accessKey">X-Deploy-Key</label>
                <input id="accessKey" placeholder="비어 있으면 인증 없이 호출" />
            </section>

            <section class="card">
                <h2>Release 생성</h2>
                <label for="channel">Channel</label>
                <input id="channel" value="stable" />
                <label for="platform">Platform</label>
                <input id="platform" value="win-x64" />
                <label for="notes">Notes</label>
                <textarea id="notes" rows="3"></textarea>
                <button id="createRelease">Create Release</button>
            </section>

            <section class="card">
                <h2>패키지 업로드</h2>
                <label for="releaseId">Release ID</label>
                <input id="releaseId" />
                <label for="packageType">Package Type</label>
                <select id="packageType">
                    <option value="host">host</option>
                    <option value="module">module</option>
                </select>
                <label for="targetId">Target ID</label>
                <input id="targetId" placeholder="module 업로드 시 module id" />
                <label for="packageVersion">Version</label>
                <input id="packageVersion" />
                <label for="packageFile">ZIP File</label>
                <input id="packageFile" type="file" accept=".zip" />
                <button id="uploadPackage">Upload Package</button>
            </section>
        </div>

        <section class="card" style="margin-top:16px;">
            <div class="actions">
                <button id="refreshReleases">Refresh Releases</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Release</th>
                        <th>Channel/Platform</th>
                        <th>Packages</th>
                        <th>Publish</th>
                    </tr>
                </thead>
                <tbody id="releaseRows"></tbody>
            </table>
        </section>
    </main>

    <script>
        const statusBox = document.getElementById('status');
        const releaseRows = document.getElementById('releaseRows');

        function headers() {
            const accessKey = document.getElementById('accessKey').value.trim();
            return accessKey ? { 'X-Deploy-Key': accessKey } : {};
        }

        function setStatus(message, isError = false) {
            statusBox.textContent = message;
            statusBox.style.background = isError ? 'rgba(190, 24, 93, 0.10)' : 'rgba(154, 52, 18, 0.08)';
            statusBox.style.color = isError ? '#9d174d' : '#7c2d12';
        }

        async function readJson(response) {
            const data = await response.json();
            if (!response.ok || data.success === false) {
                throw new Error(data.message || '요청 실패');
            }
            return data;
        }

        async function loadReleases() {
            setStatus('release 목록 조회 중...');
            const response = await fetch('/api/releases');
            const data = await readJson(response);
            renderRows(data.items || []);
            setStatus(`release ${data.items.length}건 조회 완료`);
        }

        function renderRows(items) {
            releaseRows.innerHTML = '';
            if (!items.length) {
                releaseRows.innerHTML = '<tr><td colspan="4">등록된 release가 없습니다.</td></tr>';
                return;
            }

            for (const item of items) {
                const packageText = (item.Packages || [])
                    .map(pkg => `${pkg.PackageType}:${pkg.Target} ${pkg.Version} (${pkg.FileName})`)
                    .join('<br />');

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="mono">${item.ReleaseId}<br />${item.IsPublished ? 'published' : 'draft'}</td>
                    <td>${item.Channel}<br />${item.Platform}</td>
                    <td class="mono">${packageText || '-'}</td>
                    <td>
                        <div class="actions">
                            <button data-release="${item.ReleaseId}" class="publishButton">Publish</button>
                            <button data-release="${item.ReleaseId}" class="useButton">Use</button>
                        </div>
                    </td>
                `;
                releaseRows.appendChild(tr);
            }

            document.querySelectorAll('.publishButton').forEach(button => {
                button.addEventListener('click', async event => {
                    await publishRelease(event.target.dataset.release);
                });
            });

            document.querySelectorAll('.useButton').forEach(button => {
                button.addEventListener('click', event => {
                    document.getElementById('releaseId').value = event.target.dataset.release;
                    setStatus(`release ${event.target.dataset.release} 선택`);
                });
            });
        }

        async function createRelease() {
            setStatus('release 생성 중...');
            const response = await fetch('/api/releases', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...headers()
                },
                body: JSON.stringify({
                    Channel: document.getElementById('channel').value,
                    Platform: document.getElementById('platform').value,
                    Notes: document.getElementById('notes').value
                })
            });
            const data = await readJson(response);
            document.getElementById('releaseId').value = data.item.ReleaseId;
            setStatus(`release 생성 완료: ${data.item.ReleaseId}`);
            await loadReleases();
        }

        async function uploadPackage() {
            const fileInput = document.getElementById('packageFile');
            const releaseId = document.getElementById('releaseId').value.trim();
            if (!releaseId) {
                setStatus('release ID 확인 필요', true);
                return;
            }
            if (!fileInput.files.length) {
                setStatus('ZIP 파일 선택 필요', true);
                return;
            }

            setStatus('패키지 업로드 중...');
            const formData = new FormData();
            formData.append('packageType', document.getElementById('packageType').value);
            formData.append('targetId', document.getElementById('targetId').value);
            formData.append('version', document.getElementById('packageVersion').value);
            formData.append('file', fileInput.files[0]);

            const response = await fetch(`/api/releases/${encodeURIComponent(releaseId)}/packages`, {
                method: 'POST',
                headers: headers(),
                body: formData
            });
            const data = await readJson(response);
            setStatus(`패키지 업로드 완료: ${data.item.FileName}`);
            fileInput.value = '';
            await loadReleases();
        }

        async function publishRelease(releaseId) {
            setStatus(`release ${releaseId} publish 중...`);
            const response = await fetch(`/api/releases/${encodeURIComponent(releaseId)}/publish`, {
                method: 'POST',
                headers: headers()
            });
            const data = await readJson(response);
            setStatus(`publish 완료: ${data.versionUrl}`);
            await loadReleases();
        }

        document.getElementById('createRelease').addEventListener('click', () => createRelease().catch(error => setStatus(error.message, true)));
        document.getElementById('uploadPackage').addEventListener('click', () => uploadPackage().catch(error => setStatus(error.message, true)));
        document.getElementById('refreshReleases').addEventListener('click', () => loadReleases().catch(error => setStatus(error.message, true)));

        loadReleases().catch(error => setStatus(error.message, true));
    </script>
</body>
</html>
