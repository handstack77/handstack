<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HandStack Deploy</title>
    <style>
        :root {
            --bg: #f6f3ee;
            --panel: #fffdfa;
            --ink: #1f2933;
            --muted: #5f6c7b;
            --line: #d7cec2;
            --accent: #8b3a1a;
            --accent-strong: #6d2c13;
            --ok: #0f766e;
            --err: #b91c1c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            color: var(--ink);
            font-family: "Segoe UI", "Malgun Gothic", sans-serif;
            background:
                radial-gradient(circle at top left, #f8d7b9, transparent 26%),
                linear-gradient(180deg, #f8f3ec 0%, #efe7db 100%);
        }
        main { max-width: 1080px; margin: 0 auto; padding: 28px 20px 40px; }
        h1 { margin: 0 0 10px; font-size: 32px; }
        p { margin: 0 0 16px; color: var(--muted); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 16px 30px rgba(31, 41, 51, 0.08);
        }
        label { display: block; font-weight: 600; margin: 10px 0 6px; }
        input, textarea, button {
            width: 100%;
            font: inherit;
        }
        input, textarea {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            background: #fff;
        }
        textarea { min-height: 92px; resize: vertical; }
        button {
            border: 0;
            border-radius: 999px;
            padding: 11px 16px;
            margin-top: 12px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
        }
        button:hover { background: var(--accent-strong); }
        .status {
            min-height: 42px;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 16px;
            background: rgba(139, 58, 26, 0.08);
            color: var(--accent-strong);
        }
        .mono { font-family: Consolas, "Courier New", monospace; font-size: 12px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--panel);
            border-radius: 18px;
            overflow: hidden;
            margin-top: 16px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .actions button { width: auto; margin-top: 0; }
        a { color: var(--accent); }
    </style>
</head>
<body>
    <main>
        <h1>HandStack Deploy</h1>
        <p>`publish-package` ZIP 업로드, manifest 확인, 등록된 패키지 목록 조회를 위한 최소 관리 화면입니다.</p>
        <div id="status" class="status">대기 중</div>

        <div class="grid">
            <section class="card">
                <h2>관리 키</h2>
                <label for="accessKey">X-Deploy-Key</label>
                <input id="accessKey" placeholder="비어 있으면 인증 없이 호출" />
                <p style="margin-top:12px;">
                    공개 manifest:
                    <a id="manifestLink" href="/release/manifest.json" target="_blank">/release/manifest.json</a>
                </p>
            </section>

            <section class="card">
                <h2>패키지 업로드</h2>
                <label for="releaseNotes">Release Notes</label>
                <textarea id="releaseNotes" placeholder="선택 사항"></textarea>
                <label for="releaseDate">Release Date (UTC)</label>
                <input id="releaseDate" placeholder="2026-04-02T09:00:00Z" />
                <label for="packageFile">ZIP File</label>
                <input id="packageFile" type="file" accept=".zip" />
                <button id="uploadPackage">Upload Package</button>
            </section>
        </div>

        <section class="card" style="margin-top:16px;">
            <div class="actions">
                <button id="refreshPackages">Refresh Packages</button>
                <button id="refreshManifest">Load Manifest</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Version</th>
                        <th>Package</th>
                        <th>Release Date</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody id="packageRows"></tbody>
            </table>
            <pre id="manifestPreview" class="mono" style="margin-top:16px; white-space:pre-wrap;"></pre>
        </section>
    </main>

    <script>
        const statusBox = document.getElementById('status');
        const packageRows = document.getElementById('packageRows');
        const manifestPreview = document.getElementById('manifestPreview');

        function headers() {
            const accessKey = document.getElementById('accessKey').value.trim();
            return accessKey ? { 'X-Deploy-Key': accessKey } : {};
        }

        function setStatus(message, isError = false) {
            statusBox.textContent = message;
            statusBox.style.background = isError ? 'rgba(185, 28, 28, 0.08)' : 'rgba(139, 58, 26, 0.08)';
            statusBox.style.color = isError ? 'var(--err)' : 'var(--accent-strong)';
        }

        async function readJson(response) {
            const data = await response.json();
            if (!response.ok || data.success === false) {
                throw new Error(data.message || '요청 실패');
            }
            return data;
        }

        async function loadPackages() {
            setStatus('패키지 목록 조회 중...');
            const response = await fetch('/api/update-packages');
            const data = await readJson(response);
            renderPackages(data.items || []);
            setStatus(`패키지 ${data.items.length}건 조회 완료`);
        }

        function renderPackages(items) {
            packageRows.innerHTML = '';
            if (!items.length) {
                packageRows.innerHTML = '<tr><td colspan="4">등록된 패키지가 없습니다.</td></tr>';
                return;
            }

            for (const item of items) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="mono">${item.version}</td>
                    <td class="mono"><a href="/release/packages/${encodeURIComponent(item.fileName)}" target="_blank">${item.fileName}</a><br />${item.size} bytes</td>
                    <td>${item.releaseDate || '-'}</td>
                    <td>${item.releaseNotes || '-'}</td>
                `;
                packageRows.appendChild(tr);
            }
        }

        async function uploadPackage() {
            const fileInput = document.getElementById('packageFile');
            if (!fileInput.files.length) {
                setStatus('ZIP 파일 선택 필요', true);
                return;
            }

            setStatus('패키지 업로드 중...');
            const formData = new FormData();
            formData.append('releaseNotes', document.getElementById('releaseNotes').value);
            formData.append('releaseDate', document.getElementById('releaseDate').value);
            formData.append('file', fileInput.files[0]);

            const response = await fetch('/api/update-packages', {
                method: 'POST',
                headers: headers(),
                body: formData
            });

            const data = await readJson(response);
            fileInput.value = '';
            setStatus(`업로드 완료: ${data.item.version}`);
            await loadPackages();
            await loadManifest();
        }

        async function loadManifest() {
            setStatus('manifest 조회 중...');
            const response = await fetch('/release/manifest.json');
            const data = await readJson(response);
            manifestPreview.textContent = JSON.stringify(data, null, 2);
            setStatus(`manifest 최신 버전: ${data.version}`);
        }

        document.getElementById('uploadPackage').addEventListener('click', () => uploadPackage().catch(error => setStatus(error.message, true)));
        document.getElementById('refreshPackages').addEventListener('click', () => loadPackages().catch(error => setStatus(error.message, true)));
        document.getElementById('refreshManifest').addEventListener('click', () => loadManifest().catch(error => setStatus(error.message, true)));

        loadPackages().catch(error => setStatus(error.message, true));
        loadManifest().catch(error => setStatus(error.message, true));
    </script>
</body>
</html>
